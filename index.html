<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Hub | Master the IELTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --cyber-maroon: #8B1D1D;
        --cyber-indigo: #1D2147;
      }
      
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        overflow-x: hidden;
      }

      @media (hover: none) and (pointer: coarse) {
        body, button, a, [role="button"] {
          cursor: auto !important;
        }
      }

      h1, h2, h3, .font-futuristic {
        font-family: 'Space Grotesk', sans-serif;
      }

      /* Futuristic Grid Background */
      .bg-cyber-grid {
        background-image: 
          linear-gradient(to right, rgba(29, 33, 71, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(29, 33, 71, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Glassmorphism utility */
      .glass-morphism {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }

      .animate-float-slow {
        animation: float 8s ease-in-out infinite;
      }

      @keyframes textReveal {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .animate-text-reveal {
        animation: textReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      /* Custom scrollbar for a tech feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--cyber-indigo);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--cyber-maroon);
      }
    </style>
